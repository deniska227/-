<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест ❤️</title>

<link rel="stylesheet" href="styl.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Georgia,serif;

overflow-x:hidden;

display:flex;
justify-content:center;

padding:60px 20px;

background:linear-gradient(-45deg,
#ffe6ee,
#ffd6e8,
#fff3f7,
#ffe2d9,
#ffd4df);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

body::before{

content:"";

position:fixed;
inset:0;

background-image:
radial-gradient(rgba(255,255,255,.85) 1px,transparent 1px);

background-size:45px 45px;

opacity:.35;

pointer-events:none;

animation:stars 12s linear infinite;

}

@keyframes stars{

from{
transform:translateY(0);
}

to{
transform:translateY(-45px);
}

}

/* сердечки */

.hearts-layer{

position:fixed;
inset:0;

overflow:hidden;

pointer-events:none;

z-index:0;

}

.sticker{

position:absolute;

bottom:-60px;

font-size:28px;

opacity:.18;

animation:floatUp linear infinite;

}

.sticker:nth-child(1){left:5%;animation-duration:12s;}
.sticker:nth-child(2){left:18%;animation-duration:17s;font-size:34px;}
.sticker:nth-child(3){left:35%;animation-duration:15s;}
.sticker:nth-child(4){left:55%;animation-duration:20s;font-size:24px;}
.sticker:nth-child(5){left:72%;animation-duration:13s;}
.sticker:nth-child(6){left:90%;animation-duration:18s;font-size:32px;}

@keyframes floatUp{

0%{

transform:translateY(0) rotate(0deg);

opacity:0;

}

15%{

opacity:.3;

}

100%{

transform:translateY(-130vh) rotate(35deg);

opacity:0;

}

}

.page{

width:100%;

position:relative;

z-index:2;

display:flex;

justify-content:center;

}

.container{

width:100%;
max-width:850px;

}

h1{

text-align:center;

font-size:60px;

color:#8d5168;

margin-bottom:15px;

text-shadow:0 6px 20px rgba(255,255,255,.7);

animation:fadeDown .8s;

}

.subtitle{

text-align:center;

font-size:19px;

color:#996174;

margin-bottom:40px;

opacity:.8;

animation:fadeDown 1.1s;

}

@keyframes fadeDown{

from{

opacity:0;
transform:translateY(-35px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.quiz{

display:flex;

flex-direction:column;

gap:25px;

}

.question{

background:rgba(255,255,255,.42);

backdrop-filter:blur(18px);

border-radius:30px;

padding:30px;

border:1px solid rgba(255,255,255,.6);

box-shadow:

0 20px 45px rgba(0,0,0,.08);

opacity:0;

transform:translateY(45px);

transition:
opacity .7s,
transform .7s,
box-shadow .3s;

}

.question.show{

opacity:1;

transform:translateY(0);

}

.question:hover{

transform:translateY(-6px);

box-shadow:0 30px 55px rgba(0,0,0,.12);

}

.question p{

font-size:22px;

font-weight:bold;

margin-bottom:20px;

text-align:center;

color:#7d4c60;

}

.question button{

width:100%;

padding:16px;

margin:10px 0;

border:none;

border-radius:18px;

background:#ffd8e7;

color:#744b5b;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.question button:hover{

background:#ffc1d6;

transform:scale(1.03);

}

.question button:disabled{

opacity:.75;

cursor:default;

}

#result{

margin-top:35px;

padding:30px;

border-radius:25px;

background:rgba(255,255,255,.42);

backdrop-filter:blur(18px);

text-align:center;

font-size:26px;

color:#824d61;

display:none;

animation:fade .7s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.next-btn{

display:none;

width:240px;

margin:35px auto;

padding:18px;

text-align:center;

text-decoration:none;

border-radius:50px;

font-size:22px;

font-weight:bold;

color:white;

background:linear-gradient(135deg,#ff7aa8,#ff4f8b);

box-shadow:0 18px 40px rgba(255,90,150,.35);

animation:pulse 2s infinite;

transition:.3s;

}

.next-btn:hover{

transform:scale(1.08);

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}

}

.progress{

width:100%;

height:12px;

border-radius:30px;

background:rgba(255,255,255,.4);

overflow:hidden;

margin-bottom:35px;

}

.progress div{

width:0%;

height:100%;

border-radius:30px;

background:linear-gradient(90deg,#ff7aa8,#ff4d88);

transition:.5s;

}

.heart{

position:fixed;

top:-40px;

pointer-events:none;

z-index:999;

animation:fall linear forwards;

}

@keyframes fall{

0%{

transform:translateY(-40px) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(110vh) rotate(360deg);

opacity:0;

}

}

</style>
</head>

<body>

<div class="hearts-layer">
    <div class="sticker">❤️</div>
    <div class="sticker">💖</div>
    <div class="sticker">💕</div>
    <div class="sticker">💗</div>
    <div class="sticker">💘</div>
    <div class="sticker">💞</div>
</div>

<div class="page">

<div class="container">

<h1>Мини тест ❤️</h1>

<div class="subtitle">
Проверим, насколько хорошо ты меня знаешь 🥹
</div>

<div class="progress">
    <div id="progressBar"></div>
</div>

<div class="quiz">

<div class="question">
<p>1. Когда мы познакомились?</p>

<button onclick="answer(this,true)">24.12.25</button>
<button onclick="answer(this,false)">23.12.25</button>
<button onclick="answer(this,false)">25.12.25</button>
<button onclick="answer(this,false)">26.12.25</button>

</div>

<div class="question">

<p>2. Что первое я подарил?</p>

<button onclick="answer(this,false)">Приятное сообщение</button>
<button onclick="answer(this,true)">Мягкую игрушку</button>
<button onclick="answer(this,false)">Что-то, я не помню</button>
<button onclick="answer(this,false)">Подарок в Telegram</button>

</div>

<div class="question">

<p>3. Ты любишь меня?</p>

<button onclick="answer(this,true)">Да ❤️</button>
<button onclick="answer(this,true)">Дааааааа</button>
<button onclick="answer(this,true)">Мозги не еби, ты же знаешь</button>
<button onclick="answer(this,false)">Нет 😡</button>

</div>

</div>

<div id="result"></div>

<a href="page4.html" class="next-btn" id="nextBtn">
❤️ Дальше
</a>

</div>

</div>

<script>

let score=0;
let answered=0;

const progress=document.getElementById("progressBar");

window.onload=()=>{

document.querySelectorAll(".question").forEach((q,i)=>{

setTimeout(()=>{

q.classList.add("show");

},i*250);

});

};

function answer(btn,isCorrect){

const question=btn.parentNode;

if(question.classList.contains("done")) return;

question.classList.add("done");

const buttons=question.querySelectorAll("button");

buttons.forEach(b=>b.disabled=true);

if(isCorrect){

score++;

btn.style.background="#b8f5b7";

}else{

btn.style.background="#ffbdbd";

buttons.forEach(b=>{

if(b.getAttribute("onclick").includes("true")){

b.style.background="#b8f5b7";

}

});

}

answered++;

progress.style.width=(answered/3*100)+"%";

if(answered===3){

setTimeout(showResult,500);

}

}

function showResult(){

const result=document.getElementById("result");

result.style.display="block";

if(score===3){

result.innerHTML=`
<h2>💖 Идеально! 💖</h2>
<p>Я был уверен что ты ответишь на все это ❤️</p>
`;

heartsRain();

document.getElementById("nextBtn").style.display="block";

}
else if(score===2){

result.innerHTML=`
<h2>💗 2 из 3</h2>
<p>Совсем чуть-чуть не хватило ❤️</p>
`;

}
else{

result.innerHTML=`
<h2>💔 ${score} из 3</h2>
<p>Похоже, у кого-то проблемы с памятью 😄</p>
`;

}

result.scrollIntoView({
behavior:"smooth"
});

}

function heartsRain(){

const arr=["❤️","💖","💕","💗","💘","💞"];

for(let i=0;i<90;i++){

setTimeout(()=>{

const h=document.createElement("div");

h.className="heart";

h.innerHTML=arr[Math.floor(Math.random()*arr.length)];

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

h.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},7000);

},i*70);

}

}

</script>

</body>
</html>

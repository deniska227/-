<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Продолжение ❤️</title>

<style>

/* ====== СЛОЙ С СЕРДЦАМИ ====== */
.hearts-layer{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.sticker{
position:absolute;
bottom:-60px;
font-size:28px;
opacity:.18;
animation:floatUp linear infinite;
}

.sticker:nth-child(1){left:5%;animation-duration:12s;}
.sticker:nth-child(2){left:18%;animation-duration:17s;font-size:34px;}
.sticker:nth-child(3){left:35%;animation-duration:15s;}
.sticker:nth-child(4){left:55%;animation-duration:20s;font-size:24px;}
.sticker:nth-child(5){left:72%;animation-duration:13s;}
.sticker:nth-child(6){left:90%;animation-duration:18s;font-size:32px;}

@keyframes floatUp{
0%{transform:translateY(0) rotate(0deg);opacity:0;}
15%{opacity:.3;}
100%{transform:translateY(-130vh) rotate(35deg);opacity:0;}
}

/* ====== ОСНОВА ====== */

.page{
position:relative;
z-index:2;
width:100%;
display:flex;
justify-content:center;
}

.container{
max-width:850px;
width:100%;
text-align:center;
}

/* ====== КАРТОЧКА ====== */

.card{
margin-top:80px;
padding:40px;
border-radius:30px;

background:rgba(255,255,255,.45);
backdrop-filter:blur(18px);

box-shadow:0 20px 50px rgba(0,0,0,.1);

animation:fadeDown .8s ease;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-30px);}
to{opacity:1;transform:translateY(0);}
}

/* ====== ТЕКСТ (БЕЗ ОБРЕЗАНИЯ!) ====== */

.text{
font-size:28px;
color:#7d4c60;
font-weight:bold;
line-height:1.5;

/* ВАЖНО */
white-space:normal;
overflow:visible;
}

/* ====== ПЕЧАТАНИЕ (мягкое) ====== */

.cursor{
display:inline-block;
width:10px;
background:#7d4c60;
margin-left:5px;
animation:blink .7s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* ====== КНОПКА ====== */

button{
margin-top:30px;
padding:16px 35px;
border:none;
border-radius:50px;

background:linear-gradient(135deg,#ff7aa8,#ff4f8b);
color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;
transition:.3s;

box-shadow:0 18px 40px rgba(255,90,150,.3);
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- фон сердечек -->
<div class="hearts-layer">
<div class="sticker">❤</div>
<div class="sticker">❤</div>
<div class="sticker">❤</div>
<div class="sticker">❤</div>
<div class="sticker">❤</div>
<div class="sticker">❤</div>
</div>

<div class="page">
<div class="container">

<div class="card">

<div class="text" id="text"></div><span class="cursor"></span>

<button onclick="next()">Продолжить</button>

</div>

</div>
</div>

<script>

const message =
"Ты думала это всё? 😏\n\nХа-ха-ха...\nПродолжаем дальше ❤️";

let i = 0;
const speed = 40;

function type(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(type, speed);
}
}

type();

function next(){
alert("Дальше будет ещё интереснее 😈");
window.location.href = "page6.html";
}

</script>

</body>
</html>
